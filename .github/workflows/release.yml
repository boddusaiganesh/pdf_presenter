name: Build & Release

# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs automatically whenever you push a tag like v1.0.0, v1.2.3-beta, etc.
on:
  push:
    tags:
      - 'v*'

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to create a GitHub Release and upload assets

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Package with electron-builder (Windows)
        run: npx electron-builder --win --publish never
        env:
          # electron-builder needs this to avoid GitHub publish during local steps
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          # Grab the NSIS installer (.exe) and the portable build
          path: |
            release/**/*.exe
            release/**/*.yml
          if-no-files-found: error

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Package with electron-builder (macOS)
        # --publish never: we publish manually in the release job below
        # CSC_IDENTITY_AUTO_DISCOVERY=false: skip code-signing (no Apple cert needed for testing)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.yml
          if-no-files-found: error

  # ── GitHub Release ───────────────────────────────────────────────────────────
  # Runs after both platform builds succeed.
  # Creates the Release page and attaches all installer files to it.
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-files/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-files/macos

      - name: Create GitHub Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          # Tag name is auto-detected from the git tag that triggered the workflow
          name: ApexPresenter ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            release-files/windows/**/*.exe
            release-files/macos/**/*.dmg
            release-files/macos/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
